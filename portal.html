<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NAΦ Portal — sign in for brotherhood news and events.">
    <meta name="author" content="Nu Alpha Phi National Executive Board">
    <meta name="referrer" content="origin">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <title>NAΦ | Nu Alpha Phi Fraternity Inc. | Portal | NAPhi</title>
    <base href="https://nualphaphi.com/">
    <script>
      (function () {
        var host = location.hostname;
        if (host === 'localhost' || host === '127.0.0.1' || host === '[::1]') {
          document.querySelector('base').href = location.origin + '/';
        }
      })();
    </script>
    <script>
      (function () {
        try {
          if (localStorage.getItem("nap_portal_theme") !== "light") {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link href="css/nap.css" rel="stylesheet">
</head>
<body>

    <a class="skip-link" href="#main">Skip to content</a>

    <div class="portal-auth-page">
        <header class="portal-auth-topbar">
            <a href="index" class="site-logo">
                <img src="img/letters.png" alt="Nu Alpha Phi — Home">
            </a>
            <a class="portal-auth-topbar__link" href="index">Back to site</a>
        </header>

        <main id="main" class="portal-auth-main">
            <div class="portal-panel">
                <span class="section-label">Brothers Only</span>
                <h1 class="section-title">NAΦ Portal</h1>
                <p class="portal-panel__text">Sign in to see brotherhood announcements and events.</p>

                <div class="portal-auth__toggle" role="tablist">
                    <button class="portal-auth__toggle-btn is-active" type="button" data-auth-view="signin" role="tab" aria-selected="true">Sign In</button>
                    <button class="portal-auth__toggle-btn" type="button" data-auth-view="signup" role="tab" aria-selected="false">Create Account</button>
                </div>

                <div class="portal-auth__panel" id="authPanelSignin">
                    <form class="portal-panel__form" id="portalSigninForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="portal-signin-email">Email</label>
                            <input class="form-input" id="portal-signin-email" name="email" type="email" autocomplete="username" required placeholder="name.naphi@gmail.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="portal-signin-password">Password</label>
                            <input class="form-input" id="portal-signin-password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••">
                        </div>
                        <button class="form-submit" type="submit">Sign In</button>
                        <p class="form-error" id="signin-error" role="alert" hidden></p>
                    </form>
                </div>

                <div class="portal-auth__panel" id="authPanelSignup" hidden>
                    <form class="portal-panel__form" id="portalSignupForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="portal-signup-firstname">First Name</label>
                            <input class="form-input" id="portal-signup-firstname" name="firstName" type="text" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="portal-signup-lastname">Last Name</label>
                            <input class="form-input" id="portal-signup-lastname" name="lastName" type="text" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="portal-signup-email">Email</label>
                            <input class="form-input" id="portal-signup-email" name="email" type="email" autocomplete="username" required placeholder="name.naphi@gmail.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="portal-signup-password">Password</label>
                            <input class="form-input" id="portal-signup-password" name="password" type="password" autocomplete="new-password" required placeholder="At least 6 characters">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="portal-signup-confirm">Confirm Password</label>
                            <input class="form-input" id="portal-signup-confirm" name="confirmPassword" type="password" autocomplete="new-password" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="portal-signup-invite">Invite Code</label>
                            <input class="form-input" id="portal-signup-invite" name="inviteCode" type="text" required placeholder="Ask your chapter">
                        </div>
                        <button class="form-submit" type="submit">Create Account</button>
                        <p class="form-error" id="signup-error" role="alert" hidden></p>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/portal-login.js"></script>
</body>
</html>
